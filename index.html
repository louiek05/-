<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>美食冒險者</title>
<style>

  /* ============================================================
     🎨 設計變數 — 想改顏色、字體、圓角，改這裡就好
     ============================================================ */
  :root {
    /* 主色調 */
    --color-primary: #111111;        /* 主要按鈕、深色文字 */
    --color-primary-text: #ffffff;   /* 主要按鈕上的文字 */
    --color-bg: #ffffff;             /* 頁面背景 */
    --color-surface: #f5f5f4;        /* 卡片、輸入框背景 */
    --color-border: #e5e5e4;         /* 邊框顏色 */

    /* 文字顏色 */
    --color-text-main: #111111;      /* 主要文字 */
    --color-text-sub: #6b6b69;       /* 次要文字（地址、說明） */
    --color-text-hint: #a8a8a5;      /* 提示文字 */

    /* 標籤顏色 — 評分 */
    --color-badge-rating-bg: #e8f5ef;
    --color-badge-rating-text: #1a7a45;

    /* 標籤顏色 — 已加入 */
    --color-added-bg: #e8f5ef;
    --color-added-text: #1a7a45;
    --color-added-border: #b6dfc9;

    /* 字體 — 改這裡換字型 */
    /* 可換成: 'Georgia', 'Noto Serif TC', 'Noto Sans TC' 等 */
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;

    /* 圓角大小 */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;

    /* APP 最大寬度（手機感） */
    --max-width: 430px;
  }

  /* ============================================================
     🌙 深色模式（自動跟隨系統）
     想關掉深色模式：把下面整個 @media 區塊刪掉就好
     ============================================================ */
  @media (prefers-color-scheme: dark) {
    :root {
      --color-primary: #f0f0ee;
      --color-primary-text: #111111;
      --color-bg: #161614;
      --color-surface: #222220;
      --color-border: #2e2e2c;
      --color-text-main: #f0f0ee;
      --color-text-sub: #9a9a97;
      --color-text-hint: #5a5a58;
      --color-badge-rating-bg: #1a3d2b;
      --color-badge-rating-text: #6fcf97;
      --color-added-bg: #1a3d2b;
      --color-added-text: #6fcf97;
      --color-added-border: #2d6644;
    }
  }

  /* ============================================================
     基礎重置
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: var(--max-width);
    min-height: 100vh;
    background: var(--color-bg);
    position: relative;
    overflow: hidden;
  }

  /* ============================================================
     畫面切換
     ============================================================ */
  .screen { display: none; animation: fadeIn 0.18s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ============================================================
     頂部導覽列
     ============================================================ */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 0;
  }

  .back-btn {
    width: 36px; height: 36px;
    background: var(--color-surface);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    color: var(--color-text-sub);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--color-border); }

  .page-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--color-text-main);
  }

  /* ============================================================
     首頁
     ============================================================ */
  .home-hero {
    padding: 56px 28px 32px;
    text-align: center;
  }

  /* APP 圖示 — 改 font-size 調大小，改內容換 emoji */
  .app-icon {
    width: 72px; height: 72px;
    background: var(--color-surface);
    border-radius: 20px;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border: 1px solid var(--color-border);
  }

  /* ============================================================
     🖊 想改 APP 名稱或副標題，改這裡對應的 HTML 文字即可
     ============================================================ */
  .app-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--color-text-hint);
    margin-bottom: 12px;
  }

  .home-question {
    font-size: 26px;
    font-weight: 700;
    color: var(--color-text-main);
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .home-sub {
    font-size: 14px;
    color: var(--color-text-sub);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  /* 主要「隨便」按鈕 */
  .roll-btn {
    width: 100%;
    padding: 17px;
    background: var(--color-primary);
    color: var(--color-primary-text);
    border: none;
    border-radius: var(--radius-lg);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .roll-btn:hover { opacity: 0.88; }
  .roll-btn:active { transform: scale(0.98); opacity: 0.75; }

  /* 首頁底部兩個次要按鈕 */
  .nav-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 12px 28px 40px;
  }

  .nav-btn {
    padding: 14px 12px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-sub);
    cursor: pointer;
    text-align: center;
    transition: background 0.12s;
  }
  .nav-btn:hover { background: var(--color-border); }
  .nav-icon { font-size: 22px; display: block; margin-bottom: 6px; }

  /* ============================================================
     推薦結果頁
     ============================================================ */
  .result-area { padding: 20px 20px 0; }

  /* 分類標題（「對自己好點」/ 「簡單吃頓飯」） */
  .result-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--color-text-hint);
    margin-bottom: 10px;
    padding: 0 2px;
  }

  /* 餐廳卡片 */
  .restaurant-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .restaurant-card:hover { border-color: var(--color-text-hint); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 10px;
  }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-main);
    line-height: 1.4;
    flex: 1;
  }

  /* 加入清單按鈕 */
  .add-btn {
    background: var(--color-primary);
    color: var(--color-primary-text);
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.12s;
  }
  .add-btn:hover { opacity: 0.8; }

  /* 已加入狀態 */
  .add-btn.added {
    background: var(--color-added-bg);
    color: var(--color-added-text);
    border: 1px solid var(--color-added-border);
  }

  .card-addr {
    font-size: 13px;
    color: var(--color-text-sub);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }

  /* 標籤 */
  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: var(--radius-full);
    border: 1px solid transparent;
  }
  .badge-rating {
    background: var(--color-badge-rating-bg);
    color: var(--color-badge-rating-text);
  }
  .badge-price {
    background: var(--color-surface);
    color: var(--color-text-sub);
    border-color: var(--color-border);
  }

  /* 再抽一次按鈕 */
  .reroll-row {
    padding: 8px 20px 32px;
    text-align: center;
  }
  .reroll-btn {
    background: none;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    padding: 9px 24px;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-sub);
    cursor: pointer;
    transition: background 0.12s;
  }
  .reroll-btn:hover { background: var(--color-surface); }

  /* ============================================================
     我的清單頁
     ============================================================ */
  .list-area { padding: 16px 20px 32px; }

  .list-count {
    font-size: 12px;
    color: var(--color-text-hint);
    margin-bottom: 12px;
  }

  /* 空清單狀態 */
  .empty-state {
    text-align: center;
    padding: 64px 24px;
    color: var(--color-text-hint);
  }
  .empty-icon { font-size: 40px; margin-bottom: 14px; }
  .empty-text { font-size: 14px; line-height: 1.7; }

  /* 清單中每間餐廳 */
  .list-item {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 10px;
    transition: border-color 0.12s;
  }

  .list-item-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 4px;
    gap: 8px;
  }

  .list-item-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-text-main);
    line-height: 1.4;
    flex: 1;
  }

  /* 刪除按鈕 */
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--color-text-hint);
    font-size: 15px;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .delete-btn:hover { background: #fee2e2; color: #dc2626; }

  .list-item-addr {
    font-size: 12px;
    color: var(--color-text-sub);
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .list-item-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .badge-cat {
    background: var(--color-surface);
    color: var(--color-text-sub);
    border-color: var(--color-border);
  }

  /* 備註輸入框 */
  .note-area {
    width: 100%;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    font-size: 13px;
    color: var(--color-text-main);
    font-family: var(--font);
    resize: none;
    min-height: 36px;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.12s;
    overflow: hidden;
  }
  .note-area::placeholder { color: var(--color-text-hint); }
  .note-area:focus { border-color: var(--color-text-sub); }

</style>
</head>

<div class="app">

       🏠 首頁

      <button class="roll-btn" onclick="doRoll()">隨便</button>
    </div>

    <div class="nav-bar">

       🎯 推薦結果頁

  <div class="screen" id="screen-result">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-home')">←</button>
      <div class="page-title">今日推薦</div>

    <div class="result-area">

      <div class="restaurant-card">

          <div class="card-name" id="simple-name"></div>
          <button class="add-btn" id="add-simple" onclick="addToList('simple')">加入清單</button>
        </div>
        <div class="card-addr" id="simple-addr"></div>
        <div class="card-meta">
          <span class="badge badge-rating" id="simple-rating"></span>
          <span class="badge badge-price" id="simple-price"></span>
        </div>
      </div>
    </div>

    <div class="reroll-row">
      <button class="reroll-btn" onclick="doRoll()">再抽一次</button>
    </div>
  </div>

  <!-- =====================================================
       📋 我的清單頁
       ===================================================== -->
  <div class="screen" id="screen-list">
    <div class="header">
      <button class="back-btn" onclick="showScreen('screen-home')">←</button>
      <div class="page-title">我的清單</div>
    </div>
    <div class="list-area">
      <div id="list-count" class="list-count"></div>
      <div id="list-content"></div>
    </div>
  </div>

</div>

   ⚙️ APP 邏輯 — 以下不需要改
   ============================================================ */
let myList = [];
let currentGood = null;
let currentSimple = null;

function rand(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-list') renderList();
}

function doRoll() {
  currentGood = rand(GOOD);
  currentSimple = rand(SIMPLE);

  document.getElementById('good-name').textContent = currentGood.name;
  document.getElementById('good-addr').textContent = currentGood.addr;
  document.getElementById('good-rating').textContent = '★ ' + currentGood.rating;
  document.getElementById('good-price').textContent = currentGood.price;

  document.getElementById('simple-name').textContent = currentSimple.name;
  document.getElementById('simple-addr').textContent = currentSimple.addr;
  document.getElementById('simple-rating').textContent = '★ ' + currentSimple.rating;
  document.getElementById('simple-price').textContent = currentSimple.price;

  const inG = myList.some(i => i.name === currentGood.name);
  const inS = myList.some(i => i.name === currentSimple.name);
  const btnG = document.getElementById('add-good');
  const btnS = document.getElementById('add-simple');
  btnG.textContent = inG ? '已加入 ✓' : '加入清單';
  btnG.className = 'add-btn' + (inG ? ' added' : '');
  btnS.textContent = inS ? '已加入 ✓' : '加入清單';
  btnS.className = 'add-btn' + (inS ? ' added' : '');

  showScreen('screen-result');
}

function addToList(type) {
  const item = type === 'good' ? currentGood : currentSimple;
  const btn = document.getElementById('add-' + type);
  if (myList.some(i => i.name === item.name)) return;
  myList.push({ ...item, note: '', type: type === 'good' ? '對自己好點' : '簡單吃頓飯' });
  btn.textContent = '已加入 ✓';
  btn.className = 'add-btn added';
}

function removeFromList(name) {
  myList = myList.filter(i => i.name !== name);
  renderList();
  if (currentGood && currentGood.name === name) {
    const b = document.getElementById('add-good');
    if (b) { b.textContent = '加入清單'; b.className = 'add-btn'; }
  }
  if (currentSimple && currentSimple.name === name) {
    const b = document.getElementById('add-simple');
    if (b) { b.textContent = '加入清單'; b.className = 'add-btn'; }
  }
}

function updateNote(name, val) {
  const item = myList.find(i => i.name === name);
  if (item) item.note = val;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function renderList() {
  const el = document.getElementById('list-content');
  const count = document.getElementById('list-count');
  count.textContent = myList.length ? '共 ' + myList.length + ' 間餐廳' : '';

  if (!myList.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">還沒有收藏的餐廳<br>去隨機抽選後加入吧！</div></div>';
    return;
  }

  el.innerHTML = myList.map(item => {
    const safeName = item.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `
      <div class="list-item">
        <div class="list-item-top">
          <div class="list-item-name">${item.name}</div>
          <button class="delete-btn" onclick="removeFromList('${safeName}')">✕</button>
        </div>
        <div class="list-item-addr">${item.addr}</div>
        <div class="list-item-meta">
          <span class="badge badge-rating">★ ${item.rating}</span>
          <span class="badge badge-price">${item.price}</span>
          <span class="badge badge-cat">${item.type}</span>
        </div>
        <textarea class="note-area" placeholder="加個備註..." rows="1"
          onchange="updateNote('${safeName}', this.value)"
          oninput="autoResize(this)"
        >${item.note}</textarea>
      </div>`;
  }).join('');
}
</script>
