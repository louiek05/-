<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>美食冒險者</title>
<style>
  :root {
    --color-primary: #7A3E1A;
    --color-primary-text: #fff8f0;
    --color-bg: #FDF5E8;
    --color-surface: #EDE0C4;
    --color-border: #D9C9A8;
    --color-text-main: #3D2009;
    --color-text-sub: #7A5C3A;
    --color-text-hint: #B59878;
    --color-badge-rating-bg: #F5E4CC;
    --color-badge-rating-text: #8B4513;
    --font: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-full: 999px;
    --max-width: 430px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --color-primary: #F5C896;
      --color-primary-text: #3D2009;
      --color-bg: #2A1A0A;
      --color-surface: #3D2810;
      --color-border: #5A3D20;
      --color-text-main: #F5E8D0;
      --color-text-sub: #C8A878;
      --color-text-hint: #7A5C3A;
      --color-badge-rating-bg: #4A2E12;
      --color-badge-rating-text: #F5C896;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--color-bg);
    color: var(--color-text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: var(--max-width);
    min-height: 100vh;
    background: var(--color-bg);
  }

  .screen { display: none; animation: fadeIn 0.18s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* 首頁 */
  .home-hero {
    padding: 56px 28px 32px;
    text-align: center;
  }

  .app-icon {
    width: 72px; height: 72px;
    border-radius: 20px;
    margin: 0 auto 24px;
    overflow: hidden;
  }
  .app-icon img {
    width: 72px; height: 72px;
    object-fit: cover;
    object-position: center;
    display: block;
    border-radius: 20px;
  }

  .app-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--color-text-hint);
    margin-bottom: 12px;
  }

  .home-question {
    font-size: 26px;
    font-weight: 700;
    color: var(--color-text-main);
    line-height: 1.35;
    margin-bottom: 10px;
  }

  .home-sub {
    font-size: 14px;
    color: var(--color-text-sub);
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .roll-btn {
    width: 100%;
    padding: 17px;
    background: var(--color-primary);
    color: var(--color-primary-text);
    border: none;
    border-radius: var(--radius-lg);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .roll-btn:hover { opacity: 0.88; }
  .roll-btn:active { transform: scale(0.98); opacity: 0.75; }

  /* 進階按鈕 */
  .advanced-btn {
    width: 100%;
    padding: 15px;
    background: none;
    color: var(--color-primary);
    border: 2.5px solid var(--color-primary);
    border-radius: var(--radius-lg);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    margin-top: 12px;
    transition: background 0.15s, opacity 0.15s;
  }
  .advanced-btn:hover { background: var(--color-surface); }
  .advanced-btn:active { opacity: 0.7; }

  /* header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back-btn {
    width: 36px; height: 36px;
    background: var(--color-surface);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 18px;
    color: var(--color-text-sub);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--color-border); }

  .page-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--color-text-main);
  }

  .emoji-card {
    border: 5px solid var(--color-border);
    border-radius: var(--radius-lg);
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    background: var(--color-bg);
    flex-shrink: 0;
    line-height: 1;
  }

  /* 結果區 */
  .result-area { padding: 16px 20px 0; }

  .result-label {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: #3D2009;
    margin-bottom: 10px;
    padding: 0 2px;
    text-align: left;
  }

  .restaurant-card {
    background: #FFFDF7;
    border: 5px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 16px;
    margin-bottom: 14px;
    text-align: center;
    transition: border-color 0.15s;
  }
  .restaurant-card:hover { border-color: var(--color-text-sub); }

  .card-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-text-main);
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .card-addr {
    font-size: 13px;
    color: var(--color-text-sub);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: var(--radius-full);
    border: 1px solid transparent;
  }
  .badge-rating {
    background: var(--color-badge-rating-bg);
    color: var(--color-badge-rating-text);
  }
  .badge-price {
    background: var(--color-surface);
    color: var(--color-text-sub);
    border-color: var(--color-border);
  }
  /* 料理標籤 */
  .badge-cuisine {
    background: #EDF3FF;
    color: #2B5BA8;
    border-color: #C5D8F5;
  }

  @media (prefers-color-scheme: dark) {
    .badge-cuisine {
      background: #1A2A45;
      color: #7BAAF7;
      border-color: #2B4575;
    }
  }

  .map-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 100%;
    padding: 9px;
    background: var(--color-surface);
    border: 2px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 600;
    color: var(--color-text-sub);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .map-btn:hover { background: var(--color-border); border-color: var(--color-text-hint); }

  .reroll-row { padding: 12px 20px 36px; }
</style>
</head>

const recentGood = [], recentSimple = [];

const AVOID = 8;

function rand(arr, recent) {
  if (!recent) return arr[Math.floor(Math.random() * arr.length)];
  const available = arr.filter(r => !recent.includes(r.name));
  const pool = available.length > 0 ? available : arr;
  const picked = pool[Math.floor(Math.random() * pool.length)];
  recent.push(picked.name);
  if (recent.length > AVOID) recent.shift();
  return picked;
}

}

function mapsUrl(name, addr) {
  const q = encodeURIComponent(name + ' ' + addr + ' 台北');
  return 'https://www.google.com/maps/search/?api=1&query=' + q;
}

function doRoll() {
  const g = rand(GOOD, recentGood);
  const s = rand(SIMPLE, recentSimple);
  document.getElementById('good-name').textContent = g.name;
  document.getElementById('good-addr').textContent = g.addr;
  document.getElementById('good-rating').textContent = '★ ' + (g.rating || '-');
  document.getElementById('good-price').textContent = g.price || '-';
  document.getElementById('good-map').href = mapsUrl(g.name, g.addr);
  document.getElementById('simple-name').textContent = s.name;
  document.getElementById('simple-addr').textContent = s.addr;
  document.getElementById('simple-rating').textContent = '★ ' + (s.rating || '-');
  document.getElementById('simple-price').textContent = s.price || '-';
  document.getElementById('simple-map').href = mapsUrl(s.name, s.addr);
  document.getElementById('emoji-box').textContent = rand(FOOD_EMOJIS);
  showScreen('screen-result');
}
